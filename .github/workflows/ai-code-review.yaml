name: AI Code Review

on:
  pull_request:
    types: [opened, ready_for_review, review_requested]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  statuses: write
  issues: write

jobs:
  review:
    uses: TailorBrands/github-resources/.github/workflows/reusable_ai_code_review.yaml@master
    with:
      pr_number: ${{ github.event.pull_request.number || github.event.issue.number }}
      track_progress: ${{ github.event.action != 'review_requested' && github.event_name != 'issue_comment' }}
    secrets: inherit
